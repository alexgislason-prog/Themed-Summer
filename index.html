<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Themed Summer">
<title>Themed Summer</title><link rel="apple-touch-icon" href="icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100vh;
  }
  .app { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; }
  .screen { display: none; padding: 1rem; padding-bottom: 2rem; }
  .screen.active { display: block; }

  .header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 1.25rem; padding-bottom: 0.75rem;
    border-bottom: 1px solid #e8e8e4;
    position: sticky; top: 0; background: #fff; z-index: 10;
    padding-top: 0.75rem;
  }
  .header h1 { font-size: 20px; font-weight: 600; flex: 1; color: #1a1a1a; }
  .sun-icon { font-size: 24px; }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: #666; font-size: 22px; padding: 4px;
    display: flex; align-items: center; border-radius: 8px;
  }
  .icon-btn:hover { background: #f0f0ea; }

  .week-card {
    background: #fff; border: 1px solid #e8e8e4;
    border-radius: 14px; padding: 1rem 1.25rem;
    margin-bottom: 10px; cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    transition: border-color 0.15s, background 0.15s;
  }
  .week-card:hover { border-color: #ccc; background: #fafaf8; }
  .week-card:active { background: #f5f5f0; }
  .week-emoji { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }
  .week-info { flex: 1; }
  .week-num { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
  .week-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin: 2px 0; }
  .week-date { font-size: 13px; color: #888; display: flex; align-items: center; gap: 4px; }
  .chevron { color: #ccc; font-size: 20px; flex-shrink: 0; }

  .add-btn {
    width: 100%; padding: 0.85rem;
    background: none; border: 1.5px dashed #ccc;
    border-radius: 14px; color: #888; font-size: 15px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px; margin-top: 4px;
    font-family: inherit;
  }
  .add-btn:hover { background: #fafaf8; border-color: #bbb; }

  .detail-meta {
    background: #fafaf8; border-radius: 10px;
    padding: 10px 14px; margin-bottom: 1rem;
    font-size: 13px; color: #666;
    display: flex; align-items: center; gap: 6px;
  }
  .notes-label { font-size: 12px; color: #999; margin-bottom: 5px; }
  .notes-box { margin-bottom: 1rem; }
  .notes-box textarea {
    width: 100%; font-size: 14px; padding: 10px 12px;
    border: 1px solid #e8e8e4; border-radius: 10px;
    background: #fafaf8; color: #1a1a1a;
    resize: none; line-height: 1.5;
    font-family: inherit;
  }
  .notes-box textarea:focus { outline: none; border-color: #aaa; }

  .progress-bar {
    height: 5px; background: #f0f0ea;
    border-radius: 3px; margin-bottom: 1.25rem; overflow: hidden;
  }
  .progress-fill { height: 100%; background: #e8a020; border-radius: 3px; transition: width 0.3s; }

  .cat-tabs {
    display: flex; gap: 6px; overflow-x: auto;
    padding-bottom: 6px; margin-bottom: 1rem; scrollbar-width: none;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    font-size: 13px; border: 1px solid #e0e0da;
    background: none; cursor: pointer; color: #666;
    white-space: nowrap; font-family: inherit;
    transition: background 0.15s;
  }
  .cat-tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  .item-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid #f0f0ea;
  }
  .item-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid #ccc; background: none;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: transparent; transition: all 0.15s;
  }
  .item-check.done { background: #e8f5ee; border-color: #5cb87a; color: #3a9a58; }
  .item-text { flex: 1; font-size: 15px; color: #1a1a1a; }
  .item-text.done { text-decoration: line-through; color: #bbb; }
  .item-del {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 18px; padding: 0 4px;
    transition: color 0.15s;
  }
  .item-del:hover { color: #e05a5a; }

  .empty-state { text-align: center; padding: 2.5rem 1rem; color: #ccc; }
  .empty-state .big-icon { font-size: 40px; display: block; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  .add-item-row { display: flex; gap: 8px; margin-top: 12px; }
  .add-item-row input {
    flex: 1; font-size: 15px; padding: 10px 14px;
    border: 1px solid #e0e0da; border-radius: 10px;
    background: #fafaf8; color: #1a1a1a; font-family: inherit;
  }
  .add-item-row input:focus { outline: none; border-color: #aaa; }
  .add-item-row button {
    padding: 10px 18px; background: #1a1a1a; color: #fff;
    border: none; border-radius: 10px; font-size: 14px;
    cursor: pointer; font-family: inherit; font-weight: 500;
  }
  .add-item-row button:active { background: #333; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    align-items: flex-end; justify-content: center;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 20px 20px 0 0;
    padding: 1.5rem 1.25rem 2rem;
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-handle {
    width: 40px; height: 4px; background: #e0e0da;
    border-radius: 2px; margin: 0 auto 1.25rem;
  }
  .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; color: #1a1a1a; }
  .field-label { font-size: 12px; color: #999; margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
  .modal input, .modal textarea {
    width: 100%; font-size: 15px; padding: 11px 14px;
    border: 1px solid #e0e0da; border-radius: 10px;
    background: #fafaf8; color: #1a1a1a; margin-bottom: 14px;
    font-family: inherit;
  }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: #aaa; }
  .modal textarea { resize: none; }
  .date-row { display: flex; gap: 8px; }
  .date-row input { flex: 1; }
  .modal-btns { display: flex; gap: 10px; margin-top: 6px; }
  .modal-btns button {
    flex: 1; padding: 13px; border-radius: 12px;
    font-size: 15px; cursor: pointer; font-family: inherit; font-weight: 500;
  }
  .btn-cancel { background: #f5f5f0; border: none; color: #666; }
  .btn-save { background: #1a1a1a; border: none; color: #fff; }
  .btn-save:active { background: #333; }

  /* SVG icons inline */
  .ico { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Home screen -->
  <div class="screen active" id="home-screen">
    <div class="header">
      <span class="sun-icon">☀️</span>
      <h1>Themed Summer</h1>
    </div>
    <div id="week-list">
      <div class="empty-state">
        <span class="big-icon">🌞</span>
        <p>No themes yet — add your first one!</p>
      </div></div>
    <button class="add-btn" onclick="openAddModal()">
      <span style="font-size:20px;">+</span> Add a theme week
    </button>
  </div>

  <!-- Detail screen -->
  <div class="screen" id="detail-screen">
    <div class="header">
      <button class="icon-btn" onclick="goHome()" aria-label="Back">←</button>
      <h1 id="detail-title"></h1>
      <button class="icon-btn" onclick="openEditModal()" aria-label="Edit">✎</button>
    </div>
    <div class="detail-meta" id="detail-meta"></div>
    <div class="notes-box" id="notes-box"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div id="item-list"></div>
    <div class="add-item-row">
      <input type="text" id="new-item-input" placeholder="Add something...">
      <button onclick="addItem()">Add</button>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-heading">New theme week</h2>
    <div class="field-label">Theme name</div>
    <input type="text" id="modal-title" placeholder="e.g. Ocean, Space, Dinosaurs...">
    <div class="field-label">Emoji icon</div>
    <input type="text" id="modal-emoji" placeholder="e.g. 🌊" maxlength="2">
    <div class="field-label">Week number</div>
    <input type="number" id="modal-week" placeholder="1" min="1" max="20">
    <div class="field-label">Dates (optional)</div>
    <div class="date-row">
      <input type="date" id="modal-start">
      <input type="date" id="modal-end">
    </div>
    <div class="field-label">Notes</div>
    <textarea id="modal-notes" rows="3" placeholder="Theme ideas, reminders..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTheme()">Save</button>
    </div>
  </div>
</div>

<script>
const CATS = ['Activities','Books','Movies','Food','Crafts'];
const CAT_ICONS = {Activities:'🏃',Books:'📚',Movies:'🎬',Food:'🍴',Crafts:'✂️'};
const STORAGE_KEY = 'themed-summer-v1';
let editingId = null;
let state = { themes: [], activeTheme: null, activeCat: 'Activities', nextId: 1 };

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
  if (!state.themes) state.themes = [];
  if (!state.nextId) state.nextId = state.themes.length + 1;
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + parseInt(day);
}

function dateDisplay(t) {
  if (t.startDate && t.endDate) return fmtDate(t.startDate) + ' – ' + fmtDate(t.endDate);
  if (t.startDate) return fmtDate(t.startDate);
  return '';
}

function renderHome() {
  const sorted = [...state.themes].sort((a,b)=>a.week-b.week);
  if (!sorted.length) {
    document.getElementById('week-list').innerHTML = `
      <div class="empty-state">
        <span class="big-icon">🌞</span>
        <p>No themes yet — add your first one!</p>
      </div>`;
    return;
  }
  document.getElementById('week-list').innerHTML = sorted.map(t => {
    const date = dateDisplay(t);
    return `<div class="week-card" onclick="openTheme(${t.id})">
      <div class="week-emoji">${t.emoji||'🌟'}</div>
      <div class="week-info">
        <div class="week-num">Week ${t.week}</div>
        <div class="week-title">${t.title}</div>
        ${date ? `<div class="week-date">📅 ${date}</div>` : ''}
      </div>
      <div class="chevron">›</div>
    </div>`;
  }).join('');
}

function openTheme(id) {
  state.activeTheme = state.themes.find(t=>t.id===id);
  state.activeCat = 'Activities';
  document.getElementById('detail-title').textContent = state.activeTheme.emoji + ' ' + state.activeTheme.title;
  renderDetailMeta();
  renderNotes();
  renderCatTabs();
  renderItems();
  updateProgress();
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('detail-screen').classList.add('active');
  window.scrollTo(0,0);
}

function renderDetailMeta() {
  const t = state.activeTheme;
  const date = dateDisplay(t) || 'No dates set';
  document.getElementById('detail-meta').innerHTML = `📅 ${date}`;
}

function renderNotes() {
  const t = state.activeTheme;
  document.getElementById('notes-box').innerHTML = `
    <div class="notes-label">NOTES</div>
    <textarea rows="2" placeholder="Add theme notes or ideas..." onchange="updateNotes(this.value)">${t.notes||''}</textarea>`;
}

function updateNotes(val) { state.activeTheme.notes = val; save(); }

function renderCatTabs() {
  document.getElementById('cat-tabs').innerHTML = CATS.map(c => {
    const count = state.activeTheme.items[c] ? state.activeTheme.items[c].length : 0;
    return `<button class="cat-tab${c===state.activeCat?' active':''}" onclick="switchCat('${c}')">${CAT_ICONS[c]} ${c}${count?' ('+count+')':''}</button>`;
  }).join('');
}

function switchCat(cat) { state.activeCat = cat; renderCatTabs(); renderItems(); }

function renderItems() {
  const items = (state.activeTheme.items[state.activeCat]||[]);
  const el = document.getElementById('item-list');
  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><span class="big-icon">${CAT_ICONS[state.activeCat]}</span><p>No ${state.activeCat.toLowerCase()} yet</p></div>`;
    return;
  }
  el.innerHTML = items.map((item,i)=>`
    <div class="item-row">
      <button class="item-check${item.done?' done':''}" onclick="toggleItem(${i})">${item.done?'✓':''}</button>
      <span class="item-text${item.done?' done':''}">${item.text}</span>
      <button class="item-del" onclick="deleteItem(${i})">×</button>
    </div>`).join('');
}

function toggleItem(i) {
  state.activeTheme.items[state.activeCat][i].done = !state.activeTheme.items[state.activeCat][i].done;
  save(); renderItems(); renderCatTabs(); updateProgress();
}

function deleteItem(i) {
  state.activeTheme.items[state.activeCat].splice(i,1);
  save(); renderItems(); renderCatTabs(); updateProgress();
}

function addItem() {
  const input = document.getElementById('new-item-input');
  const text = input.value.trim();
  if (!text) return;
  if (!state.activeTheme.items[state.activeCat]) state.activeTheme.items[state.activeCat] = [];
  state.activeTheme.items[state.activeCat].push({text, done:false});
  input.value = '';
  save(); renderItems(); renderCatTabs(); updateProgress();
}

document.getElementById('new-item-input').addEventListener('keydown', e => { if(e.key==='Enter') addItem(); });

function updateProgress() {
  const all = Object.values(state.activeTheme.items).flat();
  const pct = all.length ? Math.round(all.filter(i=>i.done).length/all.length*100) : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
}

function goHome() {
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('home-screen').classList.add('active');
  window.scrollTo(0,0);
  renderHome();
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-heading').textContent = 'New theme week';
  ['modal-title','modal-emoji','modal-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-week').value = state.themes.length + 1;
  document.getElementById('modal-start').value='';
  document.getElementById('modal-end').value='';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-title').focus(), 100);
}

function openEditModal() {
  const t = state.activeTheme;
  editingId = t.id;
  document.getElementById('modal-heading').textContent = 'Edit theme';
  document.getElementById('modal-title').value = t.title;
  document.getElementById('modal-emoji').value = t.emoji||'';
  document.getElementById('modal-week').value = t.week;
  document.getElementById('modal-start').value = t.startDate||'';
  document.getElementById('modal-end').value = t.endDate||'';
  document.getElementById('modal-notes').value = t.notes||'';
  document.getElementById('add-modal').classList.add('open');
}

function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) closeModal();
});

function saveTheme() {
  const title = document.getElementById('modal-title').value.trim();
  if (!title) { document.getElementById('modal-title').focus(); return; }
  const emoji = document.getElementById('modal-emoji').value.trim() || '🌟';
  const week = parseInt(document.getElementById('modal-week').value) || state.themes.length + 1;
  const startDate = document.getElementById('modal-start').value;
  const endDate = document.getElementById('modal-end').value;
  const notes = document.getElementById('modal-notes').value.trim();

  if (editingId) {
    const t = state.themes.find(t=>t.id===editingId);
    Object.assign(t, {title, emoji, week, startDate, endDate, notes});
    state.activeTheme = t;
    closeModal();
    document.getElementById('detail-title').textContent = t.emoji + ' ' + t.title;
    renderDetailMeta();
  } else {
    const newTheme = {
      id: state.nextId++, title, emoji, week, startDate, endDate, notes,
      items: {Activities:[], Books:[], Movies:[], Food:[], Crafts:[]}
    };
    state.themes.push(newTheme);
    closeModal();
    renderHome();
  }
  save();
}

load();
renderHome();
</script>


</body></html>
