<script>
const DEFAULT_CATS = ['Activities','Books','Movies','Food','Crafts'];
const CAT_ICONS = {Activities:'🏃',Books:'📚',Movies:'🎬',Food:'🍴',Crafts:'✂️'};
const STORAGE_KEY = 'themed-summer-v1';

const COLORS = [
  { name:'violet',  bg:'#2d1a4a', border:'#7c3aed', accent:'#a78bfa', text:'#ddd6fe' },
  { name:'rose',    bg:'#3a1a2a', border:'#be185d', accent:'#f472b6', text:'#fce7f3' },
  { name:'sky',     bg:'#0f2a3a', border:'#0369a1', accent:'#38bdf8', text:'#e0f2fe' },
  { name:'emerald', bg:'#0a2e1a', border:'#047857', accent:'#34d399', text:'#d1fae5' },
  { name:'amber',   bg:'#2e1e00', border:'#b45309', accent:'#fbbf24', text:'#fef3c7' },
  { name:'coral',   bg:'#3a1410', border:'#c2410c', accent:'#fb923c', text:'#ffedd5' },
  { name:'pink',    bg:'#3a0a2e', border:'#9d174d', accent:'#ec4899', text:'#fdf2f8' },
  { name:'teal',    bg:'#0a2e2a', border:'#0f766e', accent:'#2dd4bf', text:'#ccfbf1' },
];

let editingId = null;
let selectedColor = COLORS[0];
let state = { themes: [], activeTheme: null, activeCat: 'Activities', nextId: 1, customCats: [] };

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
  if (!state.themes) state.themes = [];
  if (!state.nextId) state.nextId = state.themes.length + 1;
  if (!state.customCats) state.customCats = [];
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getAllCats() { return [...DEFAULT_CATS, ...state.customCats]; }
function getCatIcon(c) { return CAT_ICONS[c] || '📌'; }
function getColor(n) { return COLORS.find(c=>c.name===n) || COLORS[0]; }

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + parseInt(day);
}
function dateDisplay(t) {
  if (t.startDate && t.endDate) return fmtDate(t.startDate) + ' – ' + fmtDate(t.endDate);
  if (t.startDate) return fmtDate(t.startDate);
  return '';
}

// ── SEARCH ──────────────────────────────────────────
function handleSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  document.getElementById('search-clear').style.display = q ? 'block' : 'none';
  const resultsEl = document.getElementById('search-results');
  const listEl = document.getElementById('week-list');
  if (!q) { resultsEl.style.display = 'none'; listEl.style.display = 'block'; return; }
  listEl.style.display = 'none';
  resultsEl.style.display = 'block';
  const results = [];
  state.themes.forEach(t => {
    getAllCats().forEach(cat => {
      (t.items[cat]||[]).forEach(item => {
        if (item.text.toLowerCase().includes(q)) results.push({theme: t, cat, item});
      });
    });
  });
  if (!results.length) {
    resultsEl.innerHTML = `<div class="search-empty">No results for "${q}"</div>`;
    return;
  }
  const col_map = {};
  COLORS.forEach(c => col_map[c.name] = c);
  resultsEl.innerHTML = '<div class="search-results">' + results.map(r => {
    const col = getColor(r.theme.color);
    const highlighted = r.item.text.replace(new RegExp(`(${q})`, 'gi'), `<mark style="color:${col.accent}">$1</mark>`);
    return `<div class="search-result-item" style="border-left:3px solid ${col.accent};">
      <div class="search-result-theme" style="color:${col.accent};">${r.theme.emoji} ${r.theme.title} · Week ${r.theme.week}</div>
      <div class="search-result-cat">${getCatIcon(r.cat)} ${r.cat}</div>
      <div class="search-result-text">${highlighted}</div>
    </div>`;
  }).join('') + '</div>';
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('week-list').style.display = 'block';
}

// ── HOME ─────────────────────────────────────────────
function renderHome() {
  const sorted = [...state.themes].sort((a,b)=>a.order-b.order);
  if (!sorted.length) {
    document.getElementById('week-list').innerHTML = `<div class="empty-state"><span class="big-icon">🌞</span><p>No themes yet — add your first one!</p></div>`;
    return;
  }
  document.getElementById('week-list').innerHTML = sorted.map((t,idx) => {
    const date = dateDisplay(t);
    const col = getColor(t.color);
    return `<div class="week-card" id="card-${t.id}" data-index="${idx}" data-id="${t.id}"
        style="background:${col.bg};border-left:4px solid ${col.accent};border-top:1px solid ${col.border};border-right:1px solid ${col.border};border-bottom:1px solid ${col.border};"
        draggable="true"
        >
      <div class="reorder-btns">
        <button class="reorder-btn" onclick="moveUp(${idx})" ${idx===0?'disabled':''} style="color:${col.accent};">▲</button>
        <button class="reorder-btn" onclick="moveDown(${idx})" ${idx===sorted.length-1?'disabled':''} style="color:${col.accent};">▼</button>
      </div>
      <div class="week-emoji" onclick="openTheme(${t.id})">${t.emoji||'🌟'}</div>
      <div class="week-info" onclick="openTheme(${t.id})">
        <div class="week-num" style="color:${col.accent};">Week ${t.week}</div>
        <div class="week-title">${t.title}</div>
        ${date?`<div class="week-date" style="color:${col.text};opacity:0.7;">📅 ${date}</div>`:''}
      </div>
      <div class="chevron" onclick="openTheme(${t.id})" style="color:${col.accent};opacity:0.5;">›</div>
    </div>`;
  }).join('');
}

// ── DRAG ─────────────────────────────────────────────
// ── REORDER ──────────────────────────────────────────
function moveUp(idx) {
  if (idx === 0) return;
  reorder(idx, idx - 1);
}
function moveDown(idx) {
  const sorted = [...state.themes].sort((a,b)=>a.order-b.order);
  if (idx >= sorted.length - 1) return;
  reorder(idx, idx + 1);
}
function reorder(fromIdx, toIdx) {
  const sorted = [...state.themes].sort((a,b)=>a.order-b.order);
  const moved = sorted.splice(fromIdx, 1)[0];
  sorted.splice(toIdx, 0, moved);
  sorted.forEach((t,i) => { t.order = i; });
  state.themes = sorted;
  save(); renderHome();
}

// ── DETAIL ───────────────────────────────────────────
function openTheme(id) {
  state.activeTheme = state.themes.find(t=>t.id===id);
  const col = getColor(state.activeTheme.color);
  document.getElementById('detail-title').textContent = state.activeTheme.emoji+' '+state.activeTheme.title;
  document.getElementById('progress-fill').style.background = col.accent;
  renderDetailMeta(); renderNotes(); renderAllSections(); renderPhotos(); updateProgress();
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('detail-screen').classList.add('active');
  window.scrollTo(0,0);
}

function renderDetailMeta() {
  const t=state.activeTheme, col=getColor(t.color);
  const el=document.getElementById('detail-meta');
  el.style.background=col.bg; el.style.color=col.text;
  el.innerHTML=`📅 ${dateDisplay(t)||'No dates set'}`;
}

function renderNotes() {
  const t=state.activeTheme;
  document.getElementById('notes-box').innerHTML=`
    <div class="notes-label">NOTES</div>
    <textarea rows="2" placeholder="Add theme notes or ideas..." onchange="updateNotes(this.value)">${t.notes||''}</textarea>`;
}

function updateNotes(val) { state.activeTheme.notes=val; save(); }

function renderAllSections() {
  const col = getColor(state.activeTheme.color);
  const cats = getAllCats();
  let html = `<button class="manage-cats-btn" onclick="openCatModal()">+ manage categories</button>`;
  cats.forEach(cat => {
    const items = state.activeTheme.items[cat] || [];
    const itemsHtml = items.length
      ? `<div class="cat-section-body" style="background:${col.bg};">`
        + items.map((item,i) => `
          <div class="cat-item-row">
            <button class="cat-item-check${item.done?' done':''}" onclick="toggleItem('${cat}',${i})"
              style="border-color:${item.done?col.accent:'#4a2870'};${item.done?`background:#2d1550;color:${col.accent};`:''}">
              ${item.done?'✓':''}
            </button>
            <span class="cat-item-text${item.done?' done':''}">${item.text}</span>
            <button class="cat-item-del" onclick="deleteItem('${cat}',${i})">×</button>
          </div>`).join('')
        + `</div>`
      : '';
    html += `
      <div class="cat-section" id="section-${cat}">
        <div class="cat-section-header">
          <div class="cat-section-title" style="color:${col.accent};">${getCatIcon(cat)} ${cat}</div>
        </div>
        ${itemsHtml}
        <div class="cat-add-row">
          <input type="text" id="input-${cat}" placeholder="Add ${cat.toLowerCase()}..." onkeydown="if(event.key==='Enter')addItem('${cat}')" />
          <button style="background:${col.accent};" onclick="addItem('${cat}')">Add</button>
        </div>
      </div>`;
  });
  document.getElementById('all-sections').innerHTML = html;
}

function toggleItem(cat, i) {
  if (!state.activeTheme.items[cat]) return;
  state.activeTheme.items[cat][i].done = !state.activeTheme.items[cat][i].done;
  save(); renderAllSections(); updateProgress();
}

function deleteItem(cat, i) {
  state.activeTheme.items[cat].splice(i,1);
  save(); renderAllSections(); updateProgress();
}

function addItem(cat) {
  const input = document.getElementById(`input-${cat}`);
  const text = input.value.trim(); if (!text) return;
  if (!state.activeTheme.items[cat]) state.activeTheme.items[cat] = [];
  state.activeTheme.items[cat].push({text, done:false});
  save(); renderAllSections(); updateProgress();
  // re-focus the input after re-render
  setTimeout(() => { const el = document.getElementById(`input-${cat}`); if(el) el.focus(); }, 50);
}

function updateProgress() {
  const all = Object.values(state.activeTheme.items).flat();
  const pct = all.length ? Math.round(all.filter(i=>i.done).length/all.length*100) : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
}

function goHome() {
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('home-screen').classList.add('active');
  window.scrollTo(0,0); renderHome();
}

// ── CUSTOM CATEGORIES ────────────────────────────────
function openCatModal() {
  renderExistingCats();
  const col=getColor(state.activeTheme.color);
  document.getElementById('add-cat-save-btn').style.background=col.accent;
  document.getElementById('new-cat-input').value='';
  document.getElementById('cat-modal').classList.add('open');
}

function closeCatModal() {
  document.getElementById('cat-modal').classList.remove('open');
  renderAllSections();
}

function renderExistingCats() {
  const all=getAllCats();
  document.getElementById('existing-cats').innerHTML=all.map(c=>`
    <div class="existing-cat-row">
      <span>${getCatIcon(c)} ${c}${DEFAULT_CATS.includes(c)?'<span class="default-badge">(default)</span>':''}</span>
      ${!DEFAULT_CATS.includes(c)?`<button class="del-cat-btn" onclick="deleteCustomCat('${c}')">×</button>`:''}
    </div>`).join('');
}

function addCustomCat() {
  const input=document.getElementById('new-cat-input');
  const name=input.value.trim();
  if (!name) return;
  if (getAllCats().map(c=>c.toLowerCase()).includes(name.toLowerCase())) { input.select(); return; }
  state.customCats.push(name);
  input.value='';
  save(); renderExistingCats();
}
document.getElementById('new-cat-input').addEventListener('keydown',e=>{ if(e.key==='Enter') addCustomCat(); });

function deleteCustomCat(name) {
  state.customCats=state.customCats.filter(c=>c!==name);
  if (state.activeCat===name) state.activeCat=getAllCats()[0]||DEFAULT_CATS[0];
  save(); renderExistingCats();
}

// ── THEME MODAL ───────────────────────────────────────
function buildColorPicker(current) {
  document.getElementById('color-picker').innerHTML=COLORS.map(c=>`
    <div class="color-swatch ${c.name===current?'selected':''}" style="background:${c.accent};" onclick="selectColor('${c.name}')" title="${c.name}"></div>`).join('');
}
function selectColor(name) {
  selectedColor=getColor(name);
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('selected',s.title===name));
  document.getElementById('modal-save-btn').style.background=selectedColor.accent;
}

function openAddModal() {
  editingId=null;
  selectedColor=COLORS[state.themes.length%COLORS.length];
  document.getElementById('modal-heading').textContent='New theme week';
  ['modal-title','modal-emoji','modal-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-week').value=state.themes.length+1;
  document.getElementById('modal-start').value='';
  document.getElementById('modal-end').value='';
  document.getElementById('modal-delete-btn').style.display='none';
  document.getElementById('modal-save-btn').style.background=selectedColor.accent;
  buildColorPicker(selectedColor.name);
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-title').focus(),100);
}

function openEditModal() {
  const t=state.activeTheme; editingId=t.id; selectedColor=getColor(t.color);
  document.getElementById('modal-heading').textContent='Edit theme';
  document.getElementById('modal-title').value=t.title;
  document.getElementById('modal-emoji').value=t.emoji||'';
  document.getElementById('modal-week').value=t.week;
  document.getElementById('modal-start').value=t.startDate||'';
  document.getElementById('modal-end').value=t.endDate||'';
  document.getElementById('modal-notes').value=t.notes||'';
  document.getElementById('modal-delete-btn').style.display='block';
  document.getElementById('modal-save-btn').style.background=selectedColor.accent;
  buildColorPicker(selectedColor.name);
  document.getElementById('add-modal').classList.add('open');
}

function closeModal() { document.getElementById('add-modal').classList.remove('open'); }
document.getElementById('add-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('add-modal')) closeModal(); });

function saveTheme() {
  const title=document.getElementById('modal-title').value.trim();
  if (!title) { document.getElementById('modal-title').focus(); return; }
  const emoji=document.getElementById('modal-emoji').value.trim()||'🌟';
  const week=parseInt(document.getElementById('modal-week').value)||state.themes.length+1;
  const startDate=document.getElementById('modal-start').value;
  const endDate=document.getElementById('modal-end').value;
  const notes=document.getElementById('modal-notes').value.trim();
  const color=selectedColor.name;
  if (editingId) {
    const t=state.themes.find(t=>t.id===editingId);
    Object.assign(t,{title,emoji,week,startDate,endDate,notes,color});
    state.activeTheme=t; closeModal();
    document.getElementById('detail-title').textContent=t.emoji+' '+t.title;
    const col=getColor(color);
    document.getElementById('progress-fill').style.background=col.accent;
    renderDetailMeta(); renderAllSections();
  } else {
    const cats={};
    getAllCats().forEach(c=>cats[c]=[]);
    state.themes.push({id:state.nextId++,title,emoji,week,startDate,endDate,notes,color,order:state.themes.length,items:cats});
    closeModal(); renderHome();
  }
  save();
}

function confirmDelete() {
  const t=state.themes.find(t=>t.id===editingId);
  document.getElementById('confirm-text').textContent=`"${t.title}" and all its items will be permanently removed.`;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }
function deleteTheme() {
  state.themes=state.themes.filter(t=>t.id!==editingId);
  closeConfirm(); closeModal();
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('home-screen').classList.add('active');
  save(); renderHome();
}

function fixOrder() {
  state.themes.forEach((t,i)=>{ if(t.order===undefined) t.order=i; if(!t.color) t.color=COLORS[i%COLORS.length].name; });
}

// ── PHOTOS ───────────────────────────────────────────
function handlePhotoUpload(e) {
  const files = [...e.target.files];
  if (!files.length) return;
  if (!state.activeTheme.photos) state.activeTheme.photos = [];
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      state.activeTheme.photos.push(ev.target.result);
      loaded++;
      if (loaded === files.length) { save(); renderPhotos(); }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderPhotos() {
  const photos = state.activeTheme.photos || [];
  const col = getColor(state.activeTheme.color);
  document.getElementById('add-photo-label').style.color = col.accent;
  document.getElementById('add-photo-label').style.borderColor = col.border;
  const grid = document.getElementById('photo-grid');
  if (!photos.length) {
    grid.innerHTML = `<div class="photo-empty">No photos yet — tap Add Photos to get started</div>`;
    return;
  }
  grid.innerHTML = photos.map((src, i) => `
    <div class="photo-thumb">
      <img src="${src}" alt="Photo ${i+1}" onclick="openLightbox(${i})" />
      <button class="photo-del" onclick="deletePhoto(${i})">×</button>
    </div>`).join('');
}

function deletePhoto(i) {
  state.activeTheme.photos.splice(i, 1);
  save(); renderPhotos();
}

function openLightbox(i) {
  document.getElementById('lightbox-img').src = state.activeTheme.photos[i];
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

load(); fixOrder(); renderHome();
</script>


</body></html>
